<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - TechWorld PC</title>
    <link rel="stylesheet" href="/home/home.css">
    <link rel="stylesheet" href="/sign-up/sign-up.css">
</head>
<body>
    <header id="main-header"></header>
    <main class="auth-page">
        <div class="auth-box">
            <h2 class="auth-title">Tạo tài khoản </h2>
            <p class="auth-sub">Đăng ký miễn phi, nhận ưu đãi ngay!</p>

            <div id="error-msg" class="auth-error" style="display: none;"></div>
            <div id="success-msg" class="auth-success" style="display: none;"></div>

            <form id="register-form">
                <div class="field">
                    <label for="fullname">Họ và tên</label>
                    <input type="text" id="fullname" placeholder="Nguyễn Văn A">
                    <span class="field-error" id="err-fullname"></span>
                </div>

                <div class="field">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="example@email.com">
                    <span class="field-error" id="err-email"></span>
                </div>

                <div class="field">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Tối thiểu 6 ký tự">
                    <span class="field-error" id="err-password"></span>
                </div>

                <div class="field">
                    <label for="confirm-password">Nhập lại mật khẩu</label>
                    <input type="password" id="confirm-password" placeholder="Nhập lại mật khẩu">
                    <span class="field-error" id="err-confirm"></span>
                </div>

                <button type="submit" class="btn btn--primary btn--block" id="register-btn">
                    Tạo tài khoản
                </button>
            </form>

            <p class="auth-switch">
                Đã có tài Khoản?
                <a href="../login/index.html">Đăng nhập</a>
            </p>
        </div>
    </main>

    <footer id="main-footer"></footer>
    <script src="/js/mock-data.js"></script>
    <script src="/js/common.js"></script>
    <script src="/sign-up/sign-up.js"></script>
</body>
</html>
